<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎱 BINGO ルーレット</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --theme-color: #d1d1d1;
    --theme-color-dark: #686868;
    --theme-color-light: #f5f5f5;
    --theme-gradient: linear-gradient(135deg, #d1d1d1, #ffffff);
    --theme-shadow: rgba(209, 209, 209, 0.5);
    --theme-bg-glow: rgba(209, 209, 209, 0.6);
    --title-color: #ffffff;
    --subtitle-color: #000000;
    --spin-btn-text-color: #1a1040;
    
    /* 新設：ぼかしと影の調整用カスタムプロパティ */
    --bg-blur: 0px;
    --shadow-strength: 30px;
    --text-shadow-x: 2px;
    --text-shadow-y: 2px;
    --text-shadow-blur: 4px;
    --text-shadow-color: rgba(0, 0, 0, 0.65);
    --page-bg-image: url('background.png');
    --roulette-top-offset: max(20px, calc((100vh - 620px) / 2));
  }

  body {
    font-family: 'Segoe UI', 'Yu Gothic', sans-serif;
    background: #222225;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: var(--roulette-top-offset) 20px 20px;
    color: #fff;
    position: relative;
    overflow-x: hidden;
    isolation: isolate;
  }

  /* 背景専用レイヤー。スクロール時に背景が追従しないよう、固定配置ではなくページ内配置にする */
  body::before,
  body::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: 100vh;
    background-image: var(--page-bg-image);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: blur(var(--bg-blur));
    z-index: -1;
    pointer-events: none;
  }
  body::before {
    top: 0;
    transform: scale(1.05);
  }

  /* 画面下にスクロール領域が必要になった時用：同じ背景を上下反転して続ける */
  body::after {
    top: 100vh;
    transform: scale(1.05) scaleY(-1);
  }

  #btn-settings-toggle {
    position: fixed; top: 16px; left: 16px;
    background: transparent; border: none;
    color: #aaa; font-size: 26px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, transform 0.2s; z-index: 90;
    outline: none;
  }
  #btn-settings-toggle:hover { color: var(--theme-color); transform: rotate(45deg); }

  /* 設定モーダル */
  #settings-modal {
    position: fixed; inset: 0;
    background: rgba(15,15,18,0.85);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }

  #title-edit {
    display: flex; flex-direction: column; align-items: center;
    gap: 12px; background: rgba(30,30,35,0.96); border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    border-radius: 16px; padding: 24px; width: 400px;
    max-height: 90vh; overflow-y: auto;
    animation: modalPop 0.25s ease-out;
  }
  @keyframes modalPop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  #title-edit label { font-size: 12px; color: #ffffff; letter-spacing: 1px; align-self: flex-start; margin-top: 4px; font-weight: bold; }
  #title-edit textarea {
    width: 100%; padding: 9px 14px; font-size: 14px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; color: #fff; outline: none; font-family: inherit;
    resize: vertical; min-height: 48px; line-height: 1.4;
  }
  #title-edit textarea:focus { border-color: var(--theme-color); background: rgba(255,255,255,0.1); }
  
  .ctrl-row { display: flex; align-items: center; gap: 10px; width: 100%; }
  .ctrl-row input[type="range"] { flex: 1; }
  .ctrl-val { font-size: 13px; color: #ffffff; min-width: 42px; text-align: right; }
  .ctrl-row select {
    flex: 1; padding: 7px 10px; font-size: 13px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; color: #fff; outline: none; cursor: pointer;
  }
  .ctrl-row select option { background: #222225; color: #fff; }
  .ctrl-row input[type="color"] { border: none; width: 40px; height: 30px; border-radius: 4px; cursor: pointer; background: transparent; }

  #drop-zone {
    width: 100%; height: 90px;
    border: 2px dashed rgba(255,255,255,0.2); border-radius: 10px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; cursor: pointer; transition: background 0.2s, border-color 0.2s;
    color: #aaa; font-size: 12px; margin-top: 4px;
  }
  #drop-zone:hover, #drop-zone.drag { background: rgba(255,255,255,0.05); border-color: var(--theme-color); color: #fff; }
  #drop-zone .icon { font-size: 20px; }
  #file-input { display: none; }

  #btn-apply {
    margin-top: 14px; padding: 10px 48px; font-size: 14px; font-weight: 700;
    border-radius: 99px; cursor: pointer; border: none;
    background: var(--theme-color); color: var(--spin-btn-text-color);
    transition: background 0.15s, transform 0.1s; width: 100%;
  }
  #btn-apply:hover { filter: brightness(1.1); }
  #btn-reset-settings {
    margin-top: 8px; padding: 9px 20px; font-size: 13px; font-weight: 700;
    border-radius: 99px; cursor: pointer; width: 100%;
    background: rgba(255,255,255,0.08); color: #fff;
    border: 1px solid rgba(255,255,255,0.22);
  }
  #btn-reset-settings:hover { background: rgba(255,255,255,0.14); }

  /* Title area */
  #title-area { text-align: center; margin-bottom: 8px; white-space: pre-line; }
  
  /* 修正：text-shadowのぼかし幅を変数化 */
  h1 {
    font-size: 22pt; font-weight: 700;
    letter-spacing: 6px; color: var(--title-color);
    text-shadow: var(--text-shadow-x) var(--text-shadow-y) var(--text-shadow-blur) var(--text-shadow-color);
    margin-bottom: 6px; white-space: pre-line;
    line-height: 1.2;
    transition: text-shadow 0.1s;
  }
  .subtitle {
    font-size: 28pt; font-weight: 700; color: var(--subtitle-color);
    letter-spacing: 4px; white-space: pre-line; line-height: 1.2;
    text-shadow: var(--text-shadow-x) var(--text-shadow-y) var(--text-shadow-blur) var(--text-shadow-color);
    transition: text-shadow 0.1s;
  }

  /* Ball area */
  /* 修正：box-shadowのぼかし幅を変数化 */
  .ball-wrap {
    width: 210px; height: 210px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--theme-color), var(--theme-color-dark));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 28px;
    box-shadow: 0 0 var(--shadow-strength) var(--theme-shadow), inset 0 0 20px rgba(255,255,255,0.15);
    transition: box-shadow 0.1s;
  }
  .ball-wrap.spinning { animation: spin 0.15s ease-in-out infinite alternate; }
  @keyframes spin { from { transform: scale(0.97) rotate(-1deg); } to { transform: scale(1.03) rotate(1deg); } }
  
  .ball-inner {
    width: 170px; height: 170px; border-radius: 50%;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    border: 4px solid rgba(255,255,255,0.3); padding: 10px; overflow: hidden;
  }
  .ball-number {
    font-size: 96px; font-weight: 700; line-height: 1.0; color: var(--theme-color-dark);
    text-align: center; white-space: pre-line; word-break: break-word;
    width: 100%; max-width: 150px;
    display: flex; align-items: center; justify-content: center; margin-top: -6px; 
  }

  /* Controls area */
  .controls { display: flex; gap: 12px; margin-bottom: 28px; align-items: stretch; }
  button { cursor: pointer; border: none; letter-spacing: 1px; transition: transform 0.1s, box-shadow 0.1s; }
  button:active { transform: scale(0.96); }
  
  /* 修正：box-shadowのぼかし幅を変数化 */
  #btn-spin {
    padding: 16px 48px; font-size: 18px; font-weight: 700; border-radius: 50px;
    background: var(--theme-gradient); color: var(--spin-btn-text-color); 
    box-shadow: 0 4px var(--shadow-strength) var(--theme-shadow);
    transition: box-shadow 0.1s;
    letter-spacing: 0;
  }
  #btn-spin:hover { box-shadow: 0 6px calc(var(--shadow-strength) + 8px) var(--theme-shadow); }
  #btn-spin:disabled { background: #3a3060; color: #6a5099; box-shadow: none; cursor: default; transform: none; }
  
  #btn-reset {
    padding: 16px 24px; font-size: 13px; font-weight: 600; border-radius: 40px;
    background: rgba(255,255,255,0.06); color: var(--theme-color-light);
    border: 1px solid rgba(255,255,255,0.15) !important;
    display: flex; align-items: center; justify-content: center;
  }
  #btn-reset:hover { background: rgba(255,255,255,0.12); }

  .history-label { font-size: 12px; color: var(--theme-color-light); letter-spacing: 2px; margin-bottom: 10px; }
  
  .history {
    display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
    padding: 12px; border-radius: 12px;
    background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05);
    /* 初期表示は1列分だけ確保し、番号が増えたらスクロールボックスにせず下方向へ自然に伸ばす */
    min-height: calc(48px + 24px + 2px); height: auto; max-height: none; overflow: visible;
    width: 100%; max-width: 82vw;
  }
  
  .hist-ball {
    width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; border: 2px solid;
    flex-shrink: 0; animation: pop 0.3s ease-out; background: #dcdce0; 
  }
  @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .all-done {
    display: none; background: rgba(74,222,128,0.15); border: 1px solid #22c55e;
    color: #4ade80; padding: 12px 24px; border-radius: 10px;
    font-weight: 600; font-size: 16px; margin-top: 16px; text-align: center;
  }


  /* ================================
     スマホ向け調整
     - 背景・全体位置・ルーレット本体サイズはPC版と同じ
     - ルーレット内の数字だけを小さめにする
     ================================ */
  @media (max-width: 600px) {
    #settings-modal {
      align-items: flex-start;
      padding: 10px;
      overflow-y: auto;
    }

    #title-edit {
      width: min(100%, 420px);
      max-height: none;
      padding: 18px;
      border-radius: 14px;
      gap: 10px;
    }

    #title-edit textarea {
      font-size: 16px;
      min-height: 44px;
    }
  }

</style>
</head>
<body>

<button id="btn-settings-toggle" title="設定画面を開く">⚙</button>
<input type="file" id="file-input" accept="image/*">

<div id="title-area">
  <h1 id="title-text">Anfini FY26<br>Kick-off Meeting</h1>
  <p class="subtitle" id="subtitle-text">BINGO TOURNAMENT</p>
</div>

<div id="settings-modal">
  <div id="title-edit">
    <div style="display:flex; width:100%; justify-content:space-between; align-items:center;">
      <h3 style="font-size:16px; color:#fff; letter-spacing:1px;">⚙ ルーレット環境設定</h3>
      <span id="btn-close-modal" style="cursor:pointer; color:#aaa; font-size:20px; font-weight:bold; padding:0 5px;">&times;</span>
    </div>

    <hr style="width: 100%; border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 4px 0;">

    <label>全体のテーマカラー</label>
    <div class="ctrl-row">
      <input type="color" id="picker-theme" value="#d1d1d1">
      <span style="font-size:11px; color:#aaa;">メインボタンや球体に適用</span>
    </div>

    <hr style="width: 100%; border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 4px 0;">
    
    <label>背景のぼかし強度</label>
    <div class="ctrl-row">
      <input type="range" id="slider-blur" min="0" max="20" value="0" step="1">
      <span class="ctrl-val" id="val-blur">0px</span>
    </div>

    <label>ボタン・球体の影（発光）</label>
    <div class="ctrl-row">
      <input type="range" id="slider-shadow" min="0" max="40" value="30" step="1">
      <span class="ctrl-val" id="val-shadow">30px</span>
    </div>

    <label>ドラムロール時間</label>
    <div class="ctrl-row">
      <input type="range" id="slider-spin-duration" min="1" max="8" value="2.97" step="0.01">
      <span class="ctrl-val" id="val-spin-duration">2.97秒</span>
    </div>

    <label>タイトル／サブタイトルの文字シャドウ</label>
    <div class="ctrl-row">
      <span style="font-size:11px; color:#aaa; min-width:54px;">影色</span>
      <input type="color" id="picker-text-shadow-color" value="#000000">
      <span style="font-size:11px; color:#aaa;">文字の影色</span>
    </div>
    <div class="ctrl-row">
      <span style="font-size:11px; color:#aaa; min-width:54px;">横位置</span>
      <input type="range" id="slider-text-shadow-x" min="-10" max="10" value="2" step="1">
      <span class="ctrl-val" id="val-text-shadow-x">2px</span>
    </div>
    <div class="ctrl-row">
      <span style="font-size:11px; color:#aaa; min-width:54px;">縦位置</span>
      <input type="range" id="slider-text-shadow-y" min="-10" max="10" value="2" step="1">
      <span class="ctrl-val" id="val-text-shadow-y">2px</span>
    </div>
    <div class="ctrl-row">
      <span style="font-size:11px; color:#aaa; min-width:54px;">ぼかし</span>
      <input type="range" id="slider-text-shadow-blur" min="0" max="20" value="4" step="1">
      <span class="ctrl-val" id="val-text-shadow-blur">4px</span>
    </div>

    <hr style="width: 100%; border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 4px 0;">

    <label>背景画像の設定</label>
    <div id="drop-zone">
      <div class="icon">🖼</div>
      <div>画像をドロップまたはクリックで選択</div>
    </div>

    <hr style="width: 100%; border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 4px 0;">

    <label>タイトル</label>
    <textarea id="input-title" placeholder="Anfini FY26&#10;Kick-off Meeting" rows="2"></textarea>
    <div class="ctrl-row">
      <input type="range" id="slider-title" min="10" max="80" value="22" step="1">
      <span class="ctrl-val" id="val-title">22pt</span>
      <input type="color" id="picker-title-color" value="#ffffff" title="文字色">
    </div>
    <div class="ctrl-row">
      <select id="font-title">
        <option value="'Segoe UI','Yu Gothic',sans-serif">デフォルト</option>
        <option value="'Yu Mincho','MS Mincho',serif">游明朝</option>
        <option value="'MS Gothic','Yu Gothic',monospace">ゴシック体</option>
        <option value="Impact,sans-serif">Impact</option>
        <option value="Georgia,serif">Georgia</option>
        <option value="'Arial Black',sans-serif">Arial Black</option>
      </select>
    </div>

    <hr style="width: 100%; border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 4px 0;">

    <label>サブタイトル</label>
    <textarea id="input-subtitle" placeholder="BINGO TOURNAMENT" rows="2"></textarea>
    <div class="ctrl-row">
      <input type="range" id="slider-sub" min="10" max="80" value="28" step="1">
      <span class="ctrl-val" id="val-sub">28pt</span>
      <input type="color" id="picker-sub-color" value="#000000" title="文字色">
    </div>
    <div class="ctrl-row">
      <select id="font-sub">
        <option value="'Segoe UI','Yu Gothic',sans-serif">デフォルト</option>
        <option value="'Yu Mincho','MS Mincho',serif">游明朝</option>
        <option value="'MS Gothic','Yu Gothic',monospace">ゴシック体</option>
        <option value="Impact,sans-serif">Impact</option>
      </select>
    </div>

    <hr style="width: 100%; border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 4px 0;">

    <label>ルーレット数字・文字のフォント</label>
    <div class="ctrl-row">
      <select id="font-ball">
        <option value="'Segoe UI','Yu Gothic',sans-serif">デフォルト</option>
        <option value="'Yu Mincho','MS Mincho',serif">游明朝</option>
        <option value="'MS Gothic','Yu Gothic',monospace">ゴシック体</option>
        <option value="Impact,sans-serif">Impact</option>
        <option value="Georgia,serif">Georgia</option>
        <option value="'Arial Black',sans-serif">Arial Black</option>
      </select>
    </div>

    <button id="btn-reset-settings" type="button">↺ 設定をデフォルトに戻す</button>
    <button id="btn-apply">✓ 設定を保存</button>
  </div>
</div>

<div class="ball-wrap" id="ballWrap">
  <div class="ball-inner" id="ballInner">
    <div class="ball-number" id="ballNumber">?</div>
  </div>
</div>

<div class="controls">
  <button id="btn-spin">🎲 START</button>
  <button id="btn-reset">🔄 RESET</button>
</div>

<div class="history-label">▼ 抽選済み番号</div>
<div class="history" id="history"></div>
<div class="all-done" id="allDone">🎉 全75番号が抽選されました！</div>

<script>
const COLORS = [
  { bg:'#1e3a5f', tc:'#60a5fa', bc:'#3b82f6' },
  { bg:'#14422a', tc:'#4ade80', bc:'#22c55e' },
  { bg:'#4a2c00', tc:'#fbbf24', bc:'#f59e0b' },
  { bg:'#4a1010', tc:'#f87171', bc:'#ef4444' },
  { bg:'#3a1060', tc:'#c084fc', bc:'#a855f7' },
];
function getColor(n) { return COLORS[Math.floor((n-1)/15)]; }

let pool = Array.from({length:75},(_,i)=>i+1);
let spinning = false;

const audioDrum = new Audio('drum.mp3');
const audioCymbal = new Audio('cymbals.mp3');
audioDrum.loop = true;

const ballWrap    = document.getElementById('ballWrap');
const ballNumber  = document.getElementById('ballNumber');
const btnSpin     = document.getElementById('btn-spin');
const btnReset    = document.getElementById('btn-reset');
const historyEl   = document.getElementById('history');
const allDone     = document.getElementById('allDone');
const dropZone    = document.getElementById('drop-zone');
const fileInput   = document.getElementById('file-input');
const titleText   = document.getElementById('title-text');
const subtitleText= document.getElementById('subtitle-text');
const inputTitle  = document.getElementById('input-title');
const inputSub    = document.getElementById('input-subtitle');
const btnApply    = document.getElementById('btn-apply');
const btnResetSettings = document.getElementById('btn-reset-settings');
const sliderTitle = document.getElementById('slider-title');
const sliderSub   = document.getElementById('slider-sub');
const valTitle    = document.getElementById('val-title');
const valSub      = document.getElementById('val-sub');
const fontTitle   = document.getElementById('font-title');
const fontSub     = document.getElementById('font-sub');
const fontBall    = document.getElementById('font-ball');

const pickerTheme = document.getElementById('picker-theme');
const pickerTitleColor = document.getElementById('picker-title-color');
const pickerSubColor = document.getElementById('picker-sub-color');

// 新規エフェクト用要素
const sliderBlur = document.getElementById('slider-blur');
const valBlur = document.getElementById('val-blur');
const sliderShadow = document.getElementById('slider-shadow');
const valShadow = document.getElementById('val-shadow');
const sliderSpinDuration = document.getElementById('slider-spin-duration');
const valSpinDuration = document.getElementById('val-spin-duration');
const pickerTextShadowColor = document.getElementById('picker-text-shadow-color');
const sliderTextShadowX = document.getElementById('slider-text-shadow-x');
const valTextShadowX = document.getElementById('val-text-shadow-x');
const sliderTextShadowY = document.getElementById('slider-text-shadow-y');
const valTextShadowY = document.getElementById('val-text-shadow-y');
const sliderTextShadowBlur = document.getElementById('slider-text-shadow-blur');
const valTextShadowBlur = document.getElementById('val-text-shadow-blur');

const settingsModal = document.getElementById('settings-modal');
const btnSettingsToggle = document.getElementById('btn-settings-toggle');
const btnCloseModal = document.getElementById('btn-close-modal');

btnSettingsToggle.addEventListener('click', showEdit);
btnCloseModal.addEventListener('click', hideModal);
settingsModal.addEventListener('click', (e) => { if(e.target === settingsModal) hideModal(); });

function hideModal() { settingsModal.style.display = 'none'; }

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.substring(1,3), 16);
  const g = parseInt(hex.substring(3,5), 16);
  const b = parseInt(hex.substring(5,7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function updateTextShadow() {
  const x = sliderTextShadowX.value + 'px';
  const y = sliderTextShadowY.value + 'px';
  const blur = sliderTextShadowBlur.value + 'px';
  const color = hexToRgba(pickerTextShadowColor.value, 0.65);
  document.documentElement.style.setProperty('--text-shadow-x', x);
  document.documentElement.style.setProperty('--text-shadow-y', y);
  document.documentElement.style.setProperty('--text-shadow-blur', blur);
  document.documentElement.style.setProperty('--text-shadow-color', color);
  valTextShadowX.textContent = x;
  valTextShadowY.textContent = y;
  valTextShadowBlur.textContent = blur;
}

function updateThemeColors(hexColor) {
  document.documentElement.style.setProperty('--theme-color', hexColor);
  document.documentElement.style.setProperty('--theme-gradient', `linear-gradient(135deg, ${hexColor}, ${adjustColorBrightness(hexColor, 30)})`);
  document.documentElement.style.setProperty('--theme-shadow', hexToRgba(hexColor, 0.5));
  document.documentElement.style.setProperty('--theme-bg-glow', hexToRgba(hexColor, 0.6));
  
  document.documentElement.style.setProperty('--theme-color-dark', adjustColorBrightness(hexColor, -50));
  document.documentElement.style.setProperty('--theme-color-light', adjustColorBrightness(hexColor, 40));

  const r = parseInt(hexColor.substring(1,3), 16);
  const g = parseInt(hexColor.substring(3,5), 16);
  const b = parseInt(hexColor.substring(5,7), 16);
  const brightness = (r * 299 + g * 587 + b * 114) / 1000;

  if (brightness >= 140) {
    document.documentElement.style.setProperty('--spin-btn-text-color', '#1a1040');
  } else {
    document.documentElement.style.setProperty('--spin-btn-text-color', '#ffffff');
  }
}

function adjustColorBrightness(hex, percent) {
  let R = parseInt(hex.substring(1,3),16);
  let G = parseInt(hex.substring(3,5),16);
  let B = parseInt(hex.substring(5,7),16);
  
  R = parseInt(R * (100 + percent) / 100);
  G = parseInt(G * (100 + percent) / 100);
  B = parseInt(B * (100 + percent) / 100);
  
  R = (R<255)?R:255; G = (G<255)?G:255; B = (B<255)?B:255;
  R = (R>0)?R:0; G = (G>0)?G:0; B = (B>0)?B:0;
  
  const rHex = ((R.toString(16).length==1)?"0"+R.toString(16):R.toString(16));
  const gHex = ((G.toString(16).length==1)?"0"+G.toString(16):G.toString(16));
  const bHex = ((B.toString(16).length==1)?"0"+B.toString(16):B.toString(16));
  
  return "#"+rHex+gHex+bHex;
}

function adjustBallFontSize(text) {
  const lines = text.split('\n');
  const maxLineLength = Math.max(...lines.map(l => l.length));
  let size = 96; 
  if (lines.length === 2) size = 56;
  else if (lines.length === 3) size = 40;
  else if (lines.length > 3) size = 30;
  if (maxLineLength > 2 && maxLineLength <= 4) size = Math.min(size, 46);
  else if (maxLineLength > 4) size = Math.min(size, 28);

  // スマホではルーレット本体や縦位置は変えず、中の数字だけ少し縮小する
  const vw = window.innerWidth || document.documentElement.clientWidth || 1024;
  const mobileScale = vw <= 380 ? 0.68 : (vw <= 600 ? 0.78 : 1);
  ballNumber.style.fontSize = Math.round(size * mobileScale) + 'px';
}

const DEFAULT_SETTINGS = {
  title: 'Anfini FY26\nKick-off Meeting',
  subtitle: 'BINGO TOURNAMENT',
  titleSize: '22',
  subtitleSize: '28',
  titleFont: "'Segoe UI','Yu Gothic',sans-serif",
  subtitleFont: "'Segoe UI','Yu Gothic',sans-serif",
  ballFont: "'Segoe UI','Yu Gothic',sans-serif",
  themeColor: '#d1d1d1',
  titleColor: '#ffffff',
  subtitleColor: '#000000',
  blur: '0',
  shadow: '30',
  spinDuration: '2.97',
  textShadowColor: '#000000',
  textShadowX: '2',
  textShadowY: '2',
  textShadowBlur: '4'
};

function updateSpinDurationDisplay() {
  valSpinDuration.textContent = Number(sliderSpinDuration.value).toFixed(2) + '秒';
}

function applySettingsValues(s) {
  titleText.innerText = s.title;
  subtitleText.innerText = s.subtitle;

  inputTitle.value = s.title;
  inputSub.value = s.subtitle;

  sliderTitle.value = s.titleSize;
  valTitle.textContent = s.titleSize + 'pt';
  titleText.style.fontSize = s.titleSize + 'pt';

  sliderSub.value = s.subtitleSize;
  valSub.textContent = s.subtitleSize + 'pt';
  subtitleText.style.fontSize = s.subtitleSize + 'pt';

  fontTitle.value = s.titleFont;
  fontSub.value = s.subtitleFont;
  fontBall.value = s.ballFont;
  titleText.style.fontFamily = s.titleFont;
  subtitleText.style.fontFamily = s.subtitleFont;
  ballNumber.style.fontFamily = s.ballFont;

  pickerTheme.value = s.themeColor;
  updateThemeColors(s.themeColor);

  pickerTitleColor.value = s.titleColor;
  pickerSubColor.value = s.subtitleColor;
  document.documentElement.style.setProperty('--title-color', s.titleColor);
  document.documentElement.style.setProperty('--subtitle-color', s.subtitleColor);

  updateTextShadow();
}

function resetSettingsToDefault() {
  if (!confirm('設定をデフォルトに戻しますか？\n※抽選済み番号はリセットされません。')) return;

  applySettingsValues(DEFAULT_SETTINGS);

  // アップロード背景を解除し、CSSの background.png に戻す
  setPageBackgroundImage("url('background.png')");

  // 現在のボールが「?」のときはテーマ色に合わせて戻す
  if (ballNumber.textContent === '?') {
    ballNumber.style.color = getComputedStyle(document.documentElement)
      .getPropertyValue('--theme-color-dark')
      .trim() || '#686868';
  }

  saveState();
}

adjustBallFontSize(ballNumber.textContent);
updateSpinDurationDisplay();

// === 状態保存（GitHub Pages / ブラウザ内保存） ===
// ※ localStorage は「同じ端末・同じブラウザ・同じURL」でのみ維持されます。
const STORAGE_KEY = 'anfini-bingo-roulette-state-v1';

function setPageBackgroundImage(bgValue) {
  document.documentElement.style.setProperty('--page-bg-image', bgValue || "url('background.png')");
}

function getInlineBackgroundDataUrl() {
  const bg = getComputedStyle(document.documentElement).getPropertyValue('--page-bg-image').trim();
  // 背景画像をアップロードした場合のみ data URL として保存する
  if (bg.startsWith('url("data:') || bg.startsWith("url('data:") || bg.startsWith('url(data:')) {
    return bg;
  }
  return '';
}

function saveState() {
  const state = {
    pool,
    currentBall: ballNumber.textContent,
    currentBallColor: ballNumber.style.color,
    history: Array.from(historyEl.querySelectorAll('.hist-ball')).map(el => Number(el.textContent)),
    allDoneVisible: allDone.style.display === 'block',
    settings: {
      title: titleText.innerText,
      subtitle: subtitleText.innerText,
      titleSize: sliderTitle.value,
      subtitleSize: sliderSub.value,
      titleFont: fontTitle.value,
      subtitleFont: fontSub.value,
      ballFont: fontBall.value,
      themeColor: pickerTheme.value,
      titleColor: pickerTitleColor.value,
      subtitleColor: pickerSubColor.value,
      blur: sliderBlur.value,
      shadow: sliderShadow.value,
      spinDuration: sliderSpinDuration.value,
      textShadowColor: pickerTextShadowColor.value,
      textShadowX: sliderTextShadowX.value,
      textShadowY: sliderTextShadowY.value,
      textShadowBlur: sliderTextShadowBlur.value
    },
    backgroundImage: getInlineBackgroundDataUrl()
  };

  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.warn('状態の保存に失敗しました。背景画像が大きすぎる可能性があります。', e);
  }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;

    const state = JSON.parse(raw);
    if (!state || !Array.isArray(state.pool)) return;

    // 抽選状態
    pool = state.pool;
    historyEl.innerHTML = '';
    if (Array.isArray(state.history)) {
      // addHistory は先頭に追加するため、古い順に復元して表示順を保つ
      [...state.history].reverse().forEach(num => {
        if (Number.isFinite(num)) addHistory(num, getColor(num));
      });
    }

    const currentBall = state.currentBall || '?';
    ballNumber.textContent = currentBall;
    adjustBallFontSize(currentBall);
    if (state.currentBallColor) {
      ballNumber.style.color = state.currentBallColor;
    } else if (currentBall !== '?' && !Number.isNaN(Number(currentBall))) {
      ballNumber.style.color = getColor(Number(currentBall)).bc;
    }

    // 設定状態
    const s = state.settings || {};
    if (s.title !== undefined) titleText.innerText = s.title;
    if (s.subtitle !== undefined) subtitleText.innerText = s.subtitle;

    if (s.titleSize !== undefined) {
      sliderTitle.value = s.titleSize;
      valTitle.textContent = s.titleSize + 'pt';
      titleText.style.fontSize = s.titleSize + 'pt';
    }
    if (s.subtitleSize !== undefined) {
      sliderSub.value = s.subtitleSize;
      valSub.textContent = s.subtitleSize + 'pt';
      subtitleText.style.fontSize = s.subtitleSize + 'pt';
    }

    if (s.titleFont !== undefined) { fontTitle.value = s.titleFont; titleText.style.fontFamily = s.titleFont; }
    if (s.subtitleFont !== undefined) { fontSub.value = s.subtitleFont; subtitleText.style.fontFamily = s.subtitleFont; }
    if (s.ballFont !== undefined) { fontBall.value = s.ballFont; ballNumber.style.fontFamily = s.ballFont; }

    if (s.themeColor !== undefined) { pickerTheme.value = s.themeColor; updateThemeColors(s.themeColor); }
    if (s.titleColor !== undefined) {
      pickerTitleColor.value = s.titleColor;
      document.documentElement.style.setProperty('--title-color', s.titleColor);
    }
    if (s.subtitleColor !== undefined) {
      pickerSubColor.value = s.subtitleColor;
      document.documentElement.style.setProperty('--subtitle-color', s.subtitleColor);
    }

    if (s.blur !== undefined) {
      sliderBlur.value = s.blur;
      valBlur.textContent = s.blur + 'px';
      document.documentElement.style.setProperty('--bg-blur', s.blur + 'px');
    }
    if (s.shadow !== undefined) {
      sliderShadow.value = s.shadow;
      valShadow.textContent = s.shadow + 'px';
      document.documentElement.style.setProperty('--shadow-strength', s.shadow + 'px');
    }
    if (s.spinDuration !== undefined) {
      sliderSpinDuration.value = s.spinDuration;
      updateSpinDurationDisplay();
    }
    if (s.textShadowColor !== undefined) pickerTextShadowColor.value = s.textShadowColor;
    if (s.textShadowX !== undefined) sliderTextShadowX.value = s.textShadowX;
    if (s.textShadowY !== undefined) sliderTextShadowY.value = s.textShadowY;
    if (s.textShadowBlur !== undefined) sliderTextShadowBlur.value = s.textShadowBlur;
    updateTextShadow();

    // 背景画像
    if (state.backgroundImage) {
      setPageBackgroundImage(state.backgroundImage);
    } else {
      setPageBackgroundImage("url('background.png')");
    }

    allDone.style.display = state.allDoneVisible || pool.length === 0 ? 'block' : 'none';
    btnSpin.disabled = pool.length === 0;
    checkWrapAndAlign();
  } catch (e) {
    console.warn('保存済み状態の読み込みに失敗しました。', e);
  }
}

loadState();


// ライブプレビュー連動イベント群
sliderTitle.addEventListener('input', () => {
  valTitle.textContent = sliderTitle.value + 'pt';
  titleText.style.fontSize = sliderTitle.value + 'pt';
});
sliderSub.addEventListener('input', () => {
  valSub.textContent = sliderSub.value + 'pt';
  subtitleText.style.fontSize = sliderSub.value + 'pt';
});

// 新規：エフェクトスライダーのライブ連動
sliderBlur.addEventListener('input', () => {
  valBlur.textContent = sliderBlur.value + 'px';
  document.documentElement.style.setProperty('--bg-blur', sliderBlur.value + 'px');
});
sliderShadow.addEventListener('input', () => {
  valShadow.textContent = sliderShadow.value + 'px';
  document.documentElement.style.setProperty('--shadow-strength', sliderShadow.value + 'px');
});
sliderSpinDuration.addEventListener('input', updateSpinDurationDisplay);
pickerTextShadowColor.addEventListener('input', updateTextShadow);
sliderTextShadowX.addEventListener('input', updateTextShadow);
sliderTextShadowY.addEventListener('input', updateTextShadow);
sliderTextShadowBlur.addEventListener('input', updateTextShadow);

fontTitle.addEventListener('change', () => { titleText.style.fontFamily = fontTitle.value; });
fontSub.addEventListener('change', () => { subtitleText.style.fontFamily = fontSub.value; });
fontBall.addEventListener('change', () => { ballNumber.style.fontFamily = fontBall.value; });

pickerTheme.addEventListener('input', () => { updateThemeColors(pickerTheme.value); });
pickerTitleColor.addEventListener('input', () => { document.documentElement.style.setProperty('--title-color', pickerTitleColor.value); });
pickerSubColor.addEventListener('input', () => { document.documentElement.style.setProperty('--subtitle-color', pickerSubColor.value); });

function showEdit() {
  inputTitle.value = titleText.innerText;
  inputSub.value = subtitleText.innerText;
  const ts = parseInt(titleText.style.fontSize) || 22;
  const ss = parseInt(subtitleText.style.fontSize) || 28;
  sliderTitle.value = ts; valTitle.textContent = ts + 'pt';
  sliderSub.value = ss; valSub.textContent = ss + 'pt';
  
  // スライダー初期位置の同期
  const blurVal = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--bg-blur')) || 0;
  const shadowVal = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--shadow-strength')) || 30;
  const textShadowXVal = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--text-shadow-x')) || 2;
  const textShadowYVal = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--text-shadow-y')) || 2;
  const textShadowBlurVal = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--text-shadow-blur')) || 4;
  sliderBlur.value = blurVal; valBlur.textContent = blurVal + 'px';
  sliderShadow.value = shadowVal; valShadow.textContent = shadowVal + 'px';
  updateSpinDurationDisplay();
  sliderTextShadowX.value = textShadowXVal; valTextShadowX.textContent = textShadowXVal + 'px';
  sliderTextShadowY.value = textShadowYVal; valTextShadowY.textContent = textShadowYVal + 'px';
  sliderTextShadowBlur.value = textShadowBlurVal; valTextShadowBlur.textContent = textShadowBlurVal + 'px';

  fontTitle.value = titleText.style.fontFamily || fontTitle.options[0].value;
  fontSub.value = subtitleText.style.fontFamily || fontSub.options[0].value;
  fontBall.value = ballNumber.style.fontFamily || fontBall.options[0].value;
  
  settingsModal.style.display = 'flex';
  inputTitle.focus();
}

function applyEdit() {
  const t = inputTitle.value || ' BINGO';
  const s = inputSub.value || 'ROULETTE TOOL';
  titleText.innerText = t;
  subtitleText.innerText = s;
  titleText.style.fontSize = sliderTitle.value + 'pt';
  subtitleText.style.fontSize = sliderSub.value + 'pt';
  titleText.style.fontFamily = fontTitle.value;
  subtitleText.style.fontFamily = fontSub.value;
  ballNumber.style.fontFamily = fontBall.value;
  
  updateThemeColors(pickerTheme.value);
  document.documentElement.style.setProperty('--title-color', pickerTitleColor.value);
  document.documentElement.style.setProperty('--subtitle-color', pickerSubColor.value);
  document.documentElement.style.setProperty('--bg-blur', sliderBlur.value + 'px');
  document.documentElement.style.setProperty('--shadow-strength', sliderShadow.value + 'px');
  updateSpinDurationDisplay();
  updateTextShadow();

  saveState();
  hideModal();
}
btnApply.addEventListener('click', applyEdit);
btnResetSettings.addEventListener('click', resetSettingsToDefault);

function applyBg(file) {
  const reader = new FileReader();
  reader.onload = e => {
    setPageBackgroundImage(`url(${e.target.result})`);
    saveState();
  };
  reader.readAsDataURL(file);
}
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) { applyBg(e.target.files[0]); }
  e.target.value = '';
});
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) { applyBg(f); }
});

function spinAnimate(finalNum, col, cb) {
  spinning = true; btnSpin.disabled = true;
  ballWrap.classList.add('spinning');
  audioDrum.currentTime = 0;
  audioDrum.play();
  
  let count = 0;
  // 既定値は従来と同じ 54 tick × 55ms = 2.97秒
  const tickMs = 55;
  const spinDurationMs = Math.max(500, Number(sliderSpinDuration.value) * 1000 || 2970);
  const totalTicks = Math.max(1, Math.round(spinDurationMs / tickMs));

  const iv = setInterval(() => {
    count++;
    const rn = Math.floor(Math.random()*75)+1;
    ballNumber.textContent = rn;
    adjustBallFontSize(String(rn));
    ballNumber.style.color = getColor(rn).bc;

    if (count >= totalTicks) {
      clearInterval(iv);
      audioDrum.pause();
      audioCymbal.currentTime = 0;
      audioCymbal.play();
      
      const finalStr = String(finalNum);
      ballNumber.textContent = finalStr;
      adjustBallFontSize(finalStr);
      ballNumber.style.color = col.bc;
      ballWrap.classList.remove('spinning');
      spinning = false; 
      cb();
    }
  }, tickMs);
}

function checkWrapAndAlign() {
  const balls = historyEl.getElementsByClassName('hist-ball');
  if (balls.length <= 1) {
    historyEl.style.justifyContent = 'center';
    return;
  }
  const firstBallTop = balls[0].offsetTop;
  let hasWrapped = false;
  for (let i = 1; i < balls.length; i++) {
    if (balls[i].offsetTop !== firstBallTop) {
      hasWrapped = true;
      break;
    }
  }
  if (hasWrapped) { historyEl.style.justifyContent = 'flex-start'; } 
  else { historyEl.style.justifyContent = 'center'; }
}

function addHistory(num, col) {
  const b = document.createElement('div');
  b.className = 'hist-ball';
  b.textContent = num;
  b.style.borderColor = col.bc;
  b.style.color = col.bc; 
  historyEl.insertBefore(b, historyEl.firstChild);
  checkWrapAndAlign();
}

btnSpin.addEventListener('click', () => {
  if (spinning || pool.length === 0) return;
  const idx = Math.floor(Math.random()*pool.length);
  const num = pool.splice(idx,1)[0];
  const col = getColor(num);
  spinAnimate(num, col, () => {
    addHistory(num, col);
    saveState();
    if (pool.length === 0) {
      btnSpin.disabled = true;
      allDone.style.display = 'block';
    } else {
      btnSpin.disabled = false;
    }
    saveState();
  });
});

btnReset.addEventListener('click', () => {
  if (spinning) return;
  if (!confirm('リセットしますか？')) return;
  pool = Array.from({length:75},(_,i)=>i+1);
  historyEl.innerHTML = '';
  historyEl.style.justifyContent = 'center';
  ballNumber.textContent = '?';
  adjustBallFontSize('?');
  ballNumber.style.color = getComputedStyle(document.documentElement).getPropertyValue('--theme-color-dark').trim() || '#686868';
  allDone.style.display = 'none';
  btnSpin.disabled = false;
  saveState();
});

window.addEventListener('resize', () => {
  checkWrapAndAlign();
  adjustBallFontSize(ballNumber.textContent || '?');
});
</script>
